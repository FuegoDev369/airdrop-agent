# ============================================================
#  AirdropAgent — Configuration Principale v1.8.1
#
#  ⚠️  SÉCURITÉ — Ce fichier est PUBLIC sur GitHub.
#  Ne jamais y mettre :
#    - Adresses wallet
#    - Clés API / tokens / secrets
#    - Informations personnelles sensibles
#
#  Toutes les informations sensibles vont dans :
#    → GitHub Secrets (production / GitHub Actions)
#    → Fichier .env local (développement Termux)
#       (.env est dans .gitignore — jamais pushé)
# ============================================================

agent:
  name: "AirdropAgent"
  version: "1.8.1"
  run_interval_hours: 2
  log_level: "INFO"
  timezone: "Africa/Porto-Novo"

# ------------------------------------------------------------
#  LLM Backend
# ------------------------------------------------------------
llm:
  mode: "groq"
  groq:
    model: "llama-3.3-70b-versatile"
    max_tokens: 1024
    temperature: 0.7
    request_delay_seconds: 1.5
  ollama:
    model: "mistral"
    base_url: "http://localhost:11434"
    max_tokens: 1024
    temperature: 0.7
    request_delay_seconds: 0

# ------------------------------------------------------------
#  Langue des outputs
# ------------------------------------------------------------
language:
  tweet_language: "en"
  notification_language: "en"

# ------------------------------------------------------------
#  Notifications
# ------------------------------------------------------------
notifications:
  discord:
    enabled: true
    mention_on_urgent: true
    daily_brief: true
    action_suggestions: true
    quest_alerts: true

  telegram:
    enabled: true
    daily_brief: true
    action_suggestions: true
    quest_alerts: true
    snapshot_alerts: true

  urgency_threshold: 7

# ------------------------------------------------------------
#  TGE Radar — Seuils d'alerte
# ------------------------------------------------------------
tge_radar:
  alert_threshold: 40     # Alerte TGE si score >= 40/100
  snapshot_threshold: 60  # Alerte snapshot si score >= 60/100

# ------------------------------------------------------------
#  Projets suivis
#  (informations publiques uniquement)
# ------------------------------------------------------------
projects:
  - name: "DAC | Quantum Chain"
    twitter_handle: "dac_chain"
    discord_guild_id: 0
    discord_channels:
      - "announcements"
      - "general"
    telegram_handle: "dac_chain"
    website_url: "https://dachain.io"
    chain: "DAC-L1"
    contract_address: null
    tge_date: null
    priority: 9
    tags: ["L1", "quantum", "testnet"]

  - name: "TENAZ"
    twitter_handle: "minetenaz"
    discord_guild_id: 0
    discord_channels:
      - "announcements"
      - "general"
    telegram_handle: ""
    website_url: ""
    chain: ""
    contract_address: null
    tge_date: null
    priority: 8
    tags: []

# ------------------------------------------------------------
#  Scraping Twitter (via instances Nitter)
# ------------------------------------------------------------
twitter:
  tweets_per_project: 15
  nitter_instances:
    - "https://nitter.net"
    - "https://nitter.privacydev.net"
    - "https://nitter.poast.org"
    - "https://nitter.1d4.us"
  request_delay_seconds: 2

# ------------------------------------------------------------
#  Scoring & Analyse
# ------------------------------------------------------------
scoring:
  urgency_weights:
    snapshot_signal: 10
    quest_expiring_24h: 9
    tge_signal: 9
    new_quest: 7
    major_announcement: 6
    regular_update: 3

  content_generation:
    tweets_per_project_per_day: 1
