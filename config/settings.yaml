# ============================================================
#  AirdropAgent — Configuration Principale v1.3
# ============================================================

agent:
  name: "AirdropAgent"
  version: "1.3.0"
  run_interval_hours: 2
  log_level: "INFO"
  timezone: "Africa/Porto-Novo"

# ------------------------------------------------------------
#  LLM Backend
# ------------------------------------------------------------
llm:
  mode: "groq"
  groq:
    model: "llama-3.3-70b-versatile"
    max_tokens: 1024
    temperature: 0.7
    # v1.3 : augmenté à 1.5s pour éliminer définitivement les 429
    # Plan gratuit Groq = 30 req/min → 1 req toutes les 2s max
    # 1.5s est un bon compromis vitesse/stabilité
    request_delay_seconds: 1.5
  ollama:
    model: "mistral"
    base_url: "http://localhost:11434"
    max_tokens: 1024
    temperature: 0.7
    request_delay_seconds: 0

# ------------------------------------------------------------
#  Langue des outputs
# ------------------------------------------------------------
language:
  tweet_language: "en"              # Toujours anglais — ne pas modifier
  notification_language: "en"       # "fr" | "en" | "es" selon préférence

# ------------------------------------------------------------
#  Notifications
# ------------------------------------------------------------
notifications:
  discord:
    enabled: true
    mention_on_urgent: true
    daily_brief: true
    action_suggestions: true
    quest_alerts: true

  telegram:
    enabled: true
    daily_brief: true
    action_suggestions: true
    quest_alerts: true
    snapshot_alerts: true

  urgency_threshold: 7

# ------------------------------------------------------------
#  Projets suivis
# ------------------------------------------------------------
projects:
  - name: "DAC | Quantum Chain"
    twitter_handle: "dac_chain"
    discord_invite: "dac_chain"
    telegram_handle: ""
    website_url: "https://dachain.io"
    chain: "DAC-L1"
    contract_address: null
    tge_date: null
    priority: 9
    tags: ["L1", "quantum", "testnet"]

  - name: "TENAZ"
    twitter_handle: "minetenaz"
    discord_invite: ""
    telegram_handle: ""
    website_url: "https://minetenaz.com"
    chain: "tenaz"
    contract_address: null
    tge_date: null
    priority: 8
    tags: ["L1", "DeFi", "mining", "SocialFi", "mobile"]

# ------------------------------------------------------------
#  Scraping Twitter (via instances Nitter)
# ------------------------------------------------------------
twitter:
  tweets_per_project: 15
  nitter_instances:
    - "https://nitter.net"
    - "https://nitter.privacydev.net"
    - "https://nitter.poast.org"
    - "https://nitter.1d4.us"
  request_delay_seconds: 2

# ------------------------------------------------------------
#  Scoring & Analyse
# ------------------------------------------------------------
scoring:
  urgency_weights:
    snapshot_signal: 10
    quest_expiring_24h: 9
    tge_signal: 9
    new_quest: 7
    major_announcement: 6
    regular_update: 3

  content_generation:
    tweets_per_project_per_day: 1
