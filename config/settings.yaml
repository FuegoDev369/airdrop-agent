# ============================================================
#  AirdropAgent — Configuration Principale v1.2
#  Modifie ce fichier selon tes besoins.
#  Aucun changement de code source requis.
# ============================================================

agent:
  name: "AirdropAgent"
  version: "1.2.0"
  run_interval_hours: 2
  log_level: "INFO"
  timezone: "Africa/Porto-Novo"

# ------------------------------------------------------------
#  LLM Backend
# ------------------------------------------------------------
llm:
  mode: "groq"
  groq:
    model: "llama-3.3-70b-versatile"    # Modèle actif Groq (maj v1.2)
    max_tokens: 1024
    temperature: 0.7
    # Délai entre appels LLM pour éviter les 429 Too Many Requests
    # Le plan gratuit Groq = ~6000 tokens/min → un délai de 0.5s suffit
    request_delay_seconds: 0.5
  ollama:
    model: "mistral"
    base_url: "http://localhost:11434"
    max_tokens: 1024
    temperature: 0.7
    request_delay_seconds: 0

# ------------------------------------------------------------
#  Langue des outputs
#
#  tweet_language   : langue des tweets générés
#                     TOUJOURS "en" — l'anglais est la langue
#                     de la crypto sur Twitter/X
#
#  notification_language : langue des alertes, briefings et
#                          suggestions d'actions Discord/Telegram
#                          "en" par défaut | "fr" | "es" | etc.
# ------------------------------------------------------------
language:
  tweet_language: "en"              # NE PAS CHANGER — toujours anglais
  notification_language: "en"       # Changer selon ta préférence

# ------------------------------------------------------------
#  Notifications
# ------------------------------------------------------------
notifications:
  discord:
    enabled: true
    mention_on_urgent: true
    daily_brief: true
    action_suggestions: true
    quest_alerts: true

  telegram:
    enabled: true
    daily_brief: true
    action_suggestions: true
    quest_alerts: true
    snapshot_alerts: true

  urgency_threshold: 7

# ------------------------------------------------------------
#  Projets suivis
# ------------------------------------------------------------
projects:
  - name: "DAC | Quantum Chain"
    twitter_handle: "dac_chain"
    discord_invite: ""
    telegram_handle: ""
    website_url: "https://dachain.io"
    chain: "DAC-L1"
    contract_address: null
    tge_date: null
    priority: 9
    tags: ["L1", "quantum", "testnet"]

  - name: "BERACHAIN"
    twitter_handle: "berachain"
    discord_invite: "berachain"
    telegram_handle: "BerachainOfficial"
    website_url: "https://berachain.com"
    chain: "berachain"
    contract_address: null
    tge_date: null
    priority: 8
    tags: ["L1", "DeFi", "mainnet"]

# ------------------------------------------------------------
#  Scraping Twitter (via instances Nitter)
# ------------------------------------------------------------
twitter:
  tweets_per_project: 15
  nitter_instances:
    - "https://nitter.net"
    - "https://nitter.privacydev.net"
    - "https://nitter.poast.org"
    - "https://nitter.1d4.us"
  request_delay_seconds: 2

# ------------------------------------------------------------
#  Scoring & Analyse
# ------------------------------------------------------------
scoring:
  urgency_weights:
    snapshot_signal: 10
    quest_expiring_24h: 9
    tge_signal: 9
    new_quest: 7
    major_announcement: 6
    regular_update: 3

  content_generation:
    tweets_per_project_per_day: 1     # 1 tweet EN par projet par run
