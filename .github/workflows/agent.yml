name: AirdropAgent — Run Autonome

on:
  schedule:
    - cron: '0 */2 * * *'

  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Activer les logs DEBUG ?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare data directory
        run: mkdir -p data/

      # ── RESTORE : cherche le dernier artifact via API GitHub ──
      # download-artifact@v4 ne peut pas chercher cross-run sans run-id explicite.
      # On utilise l'API REST GitHub pour trouver le run-id du dernier artifact
      # agent-db disponible, puis on le télécharge manuellement.
      - name: Restore agent database
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Recherche du dernier artifact agent-db..."

          # Récupère la liste des artifacts du repo via API GitHub
          ARTIFACTS=$(gh api \
            "repos/${{ github.repository }}/actions/artifacts?name=agent-db&per_page=5" \
            --jq '.artifacts | map(select(.expired == false)) | sort_by(.created_at) | reverse | .[0]')

          if [ -z "$ARTIFACTS" ] || [ "$ARTIFACTS" = "null" ]; then
            echo "Aucun artifact trouvé — premier run ou artifacts expirés. DB sera créée."
            exit 0
          fi

          ARTIFACT_ID=$(echo "$ARTIFACTS" | jq -r '.id')
          ARTIFACT_DATE=$(echo "$ARTIFACTS" | jq -r '.created_at')

          echo "Artifact trouvé : ID=$ARTIFACT_ID (créé le $ARTIFACT_DATE)"

          # Télécharge l'artifact dans data/
          gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" \
            > /tmp/agent-db.zip

          unzip -o /tmp/agent-db.zip -d data/
          echo "DB restaurée avec succès ✅ ($(du -sh data/agent.db | cut -f1))"

      - name: Run AirdropAgent
        env:
          PYTHONPATH: ${{ github.workspace }}
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK:          ${{ secrets.DISCORD_WEBHOOK }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_API_ID:          ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:        ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING:  ${{ secrets.TELEGRAM_SESSION_STRING }}
          LOG_LEVEL: ${{ github.event.inputs.debug_mode == 'true' && 'DEBUG' || 'INFO' }}

        run: python -m core.agent

      - name: Save agent database
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-db
          path: data/agent.db
          retention-days: 90
          overwrite: true

      - name: Run summary
        if: always()
        run: |
          echo "## AirdropAgent Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date** : $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger** : ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status** : ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
