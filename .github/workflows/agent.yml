name: AirdropAgent — Run Autonome

on:
  schedule:
    - cron: '0 */2 * * *'

  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Activer les logs DEBUG ?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Crée data/ avant le download — évite toute erreur de chemin
      - name: Prepare data directory
        run: mkdir -p data/

      - name: Restore agent database
        uses: actions/download-artifact@v4
        with:
          name: agent-db
          path: data/
        continue-on-error: true   # Normal au premier run : artifact inexistant

      - name: Run AirdropAgent
        env:
          # PYTHONPATH = racine du repo — résout tous les imports inter-modules
          PYTHONPATH: ${{ github.workspace }}

          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK:          ${{ secrets.DISCORD_WEBHOOK }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_API_ID:          ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:        ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING:  ${{ secrets.TELEGRAM_SESSION_STRING }}
          LOG_LEVEL: ${{ github.event.inputs.debug_mode == 'true' && 'DEBUG' || 'INFO' }}

        run: python -m core.agent

      # Sauvegarde toujours la DB — même si le run a planté partiellement
      - name: Save agent database
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-db
          path: data/agent.db
          retention-days: 90

      - name: Run summary
        if: always()
        run: |
          echo "## AirdropAgent Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date** : $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger** : ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status** : ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
